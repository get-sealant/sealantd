# Release pipeline: on a vX.Y.Z tag, build and push a multi-arch (amd64 + arm64) static sealantd
# image to GHCR. The sandbox image consumes it via `COPY --from` (see docs/runtime/integration.md).
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets buildx build the arm64 image on an amd64 runner (emulated). For faster releases,
      # swap this single job for a per-arch matrix on native runners + a manifest merge.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance via OIDC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      # Sync the SDK package versions to the git tag (tag is the single source of truth).
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm --filter "@sealant/runtime-protocol" --filter "@sealant/runtime-client" \
            exec npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: pnpm -r build
      - run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
